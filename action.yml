name: Hello Custom
description: "Une action qui salue un utilisateur avec un message personnalisé"

inputs:
  username:
    description: "Nom de l'utilisateur"
    required: false
    default: "World"
  greeting:
    description: "Salution personnalisée"
    required: false
    default: "Hello"
outputs:
  message:
    description: "Le message généré par l'action"
runs:
  using: "node20"
  main: "index.js"